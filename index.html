<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetTracker</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
  <header>
    <h1>💰 BudgetTracker</h1>
    <p>Track your income and expenses</p>
  </header>

  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="summary-card income-card">
      <div class="card-label">Total Income</div>
      <div class="card-amount" id="total-income">₹0.00</div>
    </div>
    <div class="summary-card expense-card">
      <div class="card-label">Total Expenses</div>
      <div class="card-amount" id="total-expense">₹0.00</div>
    </div>
    <div class="summary-card balance-card">
      <div class="card-label">Balance</div>
      <div class="card-amount" id="balance">₹0.00</div>
    </div>
  </div>

  <div class="main-grid">
    <!-- Add Transaction -->
    <div class="panel">
      <h2>Add Transaction</h2>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Salary, Groceries..." />
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="Salary">💼 Salary</option>
          <option value="Freelance">💻 Freelance</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Bills">💡 Bills</option>
          <option value="Health">🏥 Health</option>
          <option value="Education">📚 Education</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Type</label>
        <div class="type-toggle">
          <button class="type-btn active" id="btn-income" onclick="setType('income')">Income</button>
          <button class="type-btn" id="btn-expense" onclick="setType('expense')">Expense</button>
        </div>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="txn-date" />
      </div>
      <button class="add-btn" onclick="addTransaction()">+ Add Transaction</button>
    </div>

    <!-- Chart -->
    <div class="panel">
      <h2>Spending by Category</h2>
      <div class="chart-wrap">
        <canvas id="pie-chart"></canvas>
      </div>
      <div class="chart-tabs">
        <button class="tab-btn active" onclick="switchChart('pie', this)">Pie</button>
        <button class="tab-btn" onclick="switchChart('bar', this)">Monthly Bar</button>
      </div>
      <canvas id="bar-chart" style="display:none"></canvas>
    </div>
  </div>

  <!-- Transaction History -->
  <div class="panel full-panel">
    <div class="history-header">
      <h2>Transaction History</h2>
      <div class="history-actions">
        <select id="filter-type" onchange="renderList()">
          <option value="all">All</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
        <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>
      </div>
    </div>
    <div id="txn-list"></div>
    <p class="empty-msg" id="empty-msg">No transactions yet. Add one above!</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
